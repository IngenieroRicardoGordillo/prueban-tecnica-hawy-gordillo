server:
  port: 8081

spring:
  application:
    name: products-service
  datasource:
    url: ${PRODUCTS_DB_URL:jdbc:postgresql://localhost:5432/products_db}
    username: ${PRODUCTS_DB_USER:postgres}
    password: ${PRODUCTS_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

api:
  key: ${PRODUCTS_API_KEY:products-api-key-change-in-production}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  paths-to-match: /api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.linktic.products: INFO
