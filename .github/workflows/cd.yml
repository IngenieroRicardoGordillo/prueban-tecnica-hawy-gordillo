name: CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Git short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push · products-service
        uses: docker/build-push-action@v5
        with:
          context: ./products-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/products-service:latest
            ${{ env.IMAGE_PREFIX }}/products-service:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push · inventory-service
        uses: docker/build-push-action@v5
        with:
          context: ./inventory-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/inventory-service:latest
            ${{ env.IMAGE_PREFIX }}/inventory-service:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push · frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_PRODUCTS_API_URL=${{ vars.VITE_PRODUCTS_API_URL }}
            VITE_INVENTORY_API_URL=${{ vars.VITE_INVENTORY_API_URL }}
            VITE_PRODUCTS_API_KEY=${{ secrets.API_KEY }}
            VITE_INVENTORY_API_KEY=${{ secrets.API_KEY }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:latest
            ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Imágenes publicadas :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "| Servicio | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| products-service | \`${{ steps.meta.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| inventory-service | \`${{ steps.meta.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | \`${{ steps.meta.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
