name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  test-products-service:
    name: Tests - products-service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven local repo
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('products-service/pom.xml') }}
          restore-keys: maven-

      - name: Run tests
        working-directory: products-service
        run: mvn test -B

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: products-service-test-report
          path: products-service/target/surefire-reports/

  test-inventory-service:
    name: Tests - inventory-service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven local repo
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('inventory-service/pom.xml') }}
          restore-keys: maven-

      - name: Run tests
        working-directory: inventory-service
        run: mvn test -B

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: inventory-service-test-report
          path: inventory-service/target/surefire-reports/

  test-frontend:
    name: Tests - frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit tests
        working-directory: frontend
        run: npm run test
