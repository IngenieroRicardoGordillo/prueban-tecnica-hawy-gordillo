name: CI

on:
  pull_request:
  push:

jobs:
  test-products-service:
    name: Tests - products-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
      - name: Run tests
        run: mvn test -B
        working-directory: products-service

  test-inventory-service:
    name: Tests - inventory-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
      - name: Run tests
        run: mvn test -B
        working-directory: inventory-service

  test-frontend:
    name: Tests - frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: frontend
      - run: npm run test
        working-directory: frontend
